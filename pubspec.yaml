name: hear_link_flutter
description: Real-time audio streaming over your local network. No internet needed.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.3 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  bonsoir: ^5.1.9
  flutter_webrtc: ^0.12.1
  network_info_plus: ^6.0.0
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  http: ^1.2.1
  permission_handler: ^11.3.1
  audio_session: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true


flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"